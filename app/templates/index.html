<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Master Assistant</title>
    <!-- Fixed: use url_for so Flask correctly resolves the static path -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to the Dungeon Master Assistant</h1>

    <!-- ── Character Creation ──────────────────────────────────────────── -->
    <h2>Create Character</h2>
    <button id="createCharacterButton">Create Character</button>

    <div id="characterFormContainer" style="display: none;">
        <h3>Character Sheet</h3>
        <form id="characterForm">
            <label for="characterName">Name:</label>
            <input type="text" id="characterName" name="name" required><br><br>

            <label for="characterSpecies">Species:</label>
            <select id="characterSpecies" name="species" required>
                <option value="Dwarf">Dwarf</option>
                <option value="Elf">Elf</option>
                <option value="Halfling">Halfling</option>
                <option value="Human">Human</option>
                <option value="Dragonborn">Dragonborn</option>
                <option value="Gnome">Gnome</option>
                <option value="Half-Elf">Half-Elf</option>
                <option value="Half-Orc">Half-Orc</option>
                <option value="Tiefling">Tiefling</option>
            </select><br><br>

            <label for="characterClass">Class:</label>
            <select id="characterClass" name="character_class" required>
                <option value="Barbarian">Barbarian</option>
                <option value="Bard">Bard</option>
                <option value="Cleric">Cleric</option>
                <option value="Druid">Druid</option>
                <option value="Fighter">Fighter</option>
                <option value="Monk">Monk</option>
                <option value="Paladin">Paladin</option>
                <option value="Ranger">Ranger</option>
                <option value="Rogue">Rogue</option>
                <option value="Sorcerer">Sorcerer</option>
                <option value="Warlock">Warlock</option>
                <option value="Wizard">Wizard</option>
            </select><br><br>

            <label for="characterStats">Stats (STR, DEX, CON, INT, WIS, CHA):</label>
            <input type="text" id="characterStats" name="stats"
                   placeholder="e.g., 15, 14, 13, 12, 10, 8" required><br><br>

            <label for="characterBackground">Background:</label>
            <input type="text" id="characterBackground" name="background" required><br><br>

            <label for="characterAlignment">Alignment:</label>
            <select id="characterAlignment" name="alignment" required>
                <option value="Lawful Good">Lawful Good</option>
                <option value="Neutral Good">Neutral Good</option>
                <option value="Chaotic Good">Chaotic Good</option>
                <option value="Lawful Neutral">Lawful Neutral</option>
                <option value="True Neutral">True Neutral</option>
                <option value="Chaotic Neutral">Chaotic Neutral</option>
                <option value="Lawful Evil">Lawful Evil</option>
                <option value="Neutral Evil">Neutral Evil</option>
                <option value="Chaotic Evil">Chaotic Evil</option>
            </select><br><br>

            <button type="button" id="saveCharacterButton">Save Character</button>
        </form>
    </div>

    <!-- ── NPC Management ─────────────────────────────────────────────── -->
    <h2>Generate NPCs</h2>
    <button id="generateNpcButton">Generate NPC</button>

    <h2>Saved NPCs</h2>
    <div id="npcList">
        <!-- NPC cards rendered by JS -->
    </div>

    <script>
        // ── Character Form ───────────────────────────────────────────────
        document.getElementById('createCharacterButton').addEventListener('click', () => {
            const container = document.getElementById('characterFormContainer');
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
        });

        document.getElementById('saveCharacterButton').addEventListener('click', submitCharacterForm);

        async function submitCharacterForm() {
            const form = document.getElementById('characterForm');
            const rawStats = form.characterStats.value.split(',').map(s => parseInt(s.trim(), 10));
            const stats = {
                STR: rawStats[0] || 10,
                DEX: rawStats[1] || 10,
                CON: rawStats[2] || 10,
                INT: rawStats[3] || 10,
                WIS: rawStats[4] || 10,
                CHA: rawStats[5] || 10,
            };

            const payload = {
                name:            form.characterName.value.trim(),
                species:         form.characterSpecies.value,
                character_class: form.characterClass.value,
                alignment:       form.characterAlignment.value,
                background:      form.characterBackground.value.trim(),
                stats,
            };

            // Updated endpoint: /player_profiles
            const res = await fetch('/player_profiles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            if (res.ok) {
                alert('Character saved successfully!');
                form.reset();
                document.getElementById('characterFormContainer').style.display = 'none';
            } else {
                const err = await res.json();
                alert(`Failed to save character: ${err.error || 'Unknown error'}`);
            }
        }

        // ── NPC List ─────────────────────────────────────────────────────
        document.getElementById('generateNpcButton').addEventListener('click', generateNpc);

        async function fetchNpcs() {
            try {
                const res = await fetch('/npc');
                if (!res.ok) { console.error('Failed to fetch NPCs'); return; }

                const npcs = await res.json();
                const list = document.getElementById('npcList');
                list.innerHTML = '';

                npcs.forEach(npc => {
                    const card = document.createElement('div');
                    card.className = 'npc-card';
                    card.innerHTML = `
                        <h3>${npc.name} (${npc.role})</h3>
                        <p><strong>Alignment:</strong> ${npc.alignment}</p>
                        <p><strong>Abilities:</strong> ${npc.abilities}</p>
                        <p><strong>Spells:</strong> ${npc.spells}</p>
                        <p><strong>Racial Features:</strong> ${npc.racial_features}</p>
                        <p><strong>Description:</strong> ${npc.description}</p>
                        <p><strong>Stats:</strong> ${JSON.stringify(npc.stats)}</p>

                        <button onclick="generateQuest(${npc.id}, '${npc.name}')">Generate Quest</button>
                        <button onclick="generateLoot(${npc.id})">Generate Loot</button>
                        <button onclick="deleteNpc(${npc.id})" class="delete-button">Delete</button>

                        <div class="chat-section">
                            <h4>Chat with ${npc.name}</h4>
                            <div id="chatHistory-${npc.id}" class="chat-history"></div>
                            <div class="chat-input">
                                <input type="text" id="chatInput-${npc.id}"
                                       placeholder="Enter your message..." />
                                <button onclick="chatWithNpc(${npc.id}, '${npc.name}')"
                                        class="send-button">Send</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                    loadChatHistory(npc.id);
                });
            } catch (e) {
                console.error('Error fetching NPCs:', e);
            }
        }

        async function generateNpc() {
            const res = await fetch('/npc/generate', { method: 'POST' });
            if (res.ok) { fetchNpcs(); }
            else { alert('Failed to generate NPC.'); }
        }

        async function deleteNpc(npcId) {
            if (!confirm('Delete this NPC?')) return;
            const res = await fetch(`/npc/${npcId}`, { method: 'DELETE' });
            if (res.ok || res.status === 204) { fetchNpcs(); }
        }

        // ── Chat ─────────────────────────────────────────────────────────

        async function loadChatHistory(npcId) {
            const res = await fetch(`/npc/${npcId}/chat`);
            if (!res.ok) return;
            const messages = await res.json();
            renderMessages(npcId, messages);
        }

        function renderMessages(npcId, messages) {
            const box = document.getElementById(`chatHistory-${npcId}`);
            box.innerHTML = messages.map(m => {
                const label = m.sender === 'player' ? 'You' : m.npc_name || 'NPC';
                return `<p><strong>${label}:</strong> ${m.content}</p>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function chatWithNpc(npcId, npcName) {
            const input = document.getElementById(`chatInput-${npcId}`);
            const text = input.value.trim();
            if (!text) { alert('Please enter a message.'); return; }

            const res = await fetch(`/npc/${npcId}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: text }),
            });

            if (res.ok) {
                const data = await res.json();
                renderMessages(npcId, data.messages);
                input.value = '';
            } else {
                const err = await res.json();
                alert(`Error: ${err.error || 'Failed to send message.'}`);
            }
        }

        // ── Quests & Loot ────────────────────────────────────────────────

        async function generateQuest(npcId, npcName) {
            const location = prompt(`Where is ${npcName} assigning the quest?`);
            if (!location) return;

            const res = await fetch(`/npc/${npcId}/generate_quest`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ location }),
            });

            if (res.ok) {
                const data = await res.json();
                const box = document.getElementById(`chatHistory-${npcId}`);
                box.innerHTML += `<p><strong>${npcName}:</strong> ${data.quest}</p>`;
                box.scrollTop = box.scrollHeight;
            } else {
                alert('Failed to generate quest.');
            }
        }

        async function generateLoot(npcId) {
            const questName = prompt('Quest name (for thematic loot)?') || 'the recent quest';

            const res = await fetch(`/npc/${npcId}/generate_loot`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ quest_name: questName }),
            });

            if (res.ok) {
                const data = await res.json();
                const box = document.getElementById(`chatHistory-${npcId}`);
                box.innerHTML += `<p><strong>Loot:</strong> ${data.loot}</p>`;
                box.scrollTop = box.scrollHeight;
            } else {
                alert('Failed to generate loot.');
            }
        }

        // ── Init ─────────────────────────────────────────────────────────
        fetchNpcs();
    </script>
</body>
</html>
