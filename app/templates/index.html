<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page-wrapper">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="page-header">
    <h1>⚔ Dungeon Master Assistant</h1>
  </header>

  <!-- ── Create Character ───────────────────────────────────────────── -->
  <h2>Create Character</h2>
  <button class="btn-primary" id="createCharacterButton">+ New Character</button>

  <div id="characterFormContainer" class="form-container" style="display:none; margin-top:12px;">
    <h3 style="font-family:'Cinzel',serif; color:var(--text-heading); margin-bottom:16px;">Character Sheet</h3>
    <form id="characterForm">
      <div class="form-row">
        <label for="characterName">Name</label>
        <input type="text" id="characterName" name="name" required placeholder="Character name">
      </div>
      <div class="form-row">
        <label for="characterSpecies">Species</label>
        <select id="characterSpecies" name="species" required>
          <option value="Dwarf">Dwarf</option><option value="Elf">Elf</option>
          <option value="Halfling">Halfling</option><option value="Human">Human</option>
          <option value="Dragonborn">Dragonborn</option><option value="Gnome">Gnome</option>
          <option value="Half-Elf">Half-Elf</option><option value="Half-Orc">Half-Orc</option>
          <option value="Tiefling">Tiefling</option>
        </select>
      </div>
      <div class="form-row">
        <label for="characterClass">Class</label>
        <select id="characterClass" name="character_class" required>
          <option value="Barbarian">Barbarian</option><option value="Bard">Bard</option>
          <option value="Cleric">Cleric</option><option value="Druid">Druid</option>
          <option value="Fighter">Fighter</option><option value="Monk">Monk</option>
          <option value="Paladin">Paladin</option><option value="Ranger">Ranger</option>
          <option value="Rogue">Rogue</option><option value="Sorcerer">Sorcerer</option>
          <option value="Warlock">Warlock</option><option value="Wizard">Wizard</option>
        </select>
      </div>
      <div class="form-row">
        <label for="characterStats">Stats (STR, DEX, CON, INT, WIS, CHA)</label>
        <input type="text" id="characterStats" name="stats" placeholder="e.g. 15, 14, 13, 12, 10, 8" required>
      </div>
      <div class="form-row">
        <label for="characterBackground">Background</label>
        <input type="text" id="characterBackground" name="background" required placeholder="e.g. Soldier">
      </div>
      <div class="form-row">
        <label for="characterAlignment">Alignment</label>
        <select id="characterAlignment" name="alignment" required>
          <option value="Lawful Good">Lawful Good</option><option value="Neutral Good">Neutral Good</option>
          <option value="Chaotic Good">Chaotic Good</option><option value="Lawful Neutral">Lawful Neutral</option>
          <option value="True Neutral">True Neutral</option><option value="Chaotic Neutral">Chaotic Neutral</option>
          <option value="Lawful Evil">Lawful Evil</option><option value="Neutral Evil">Neutral Evil</option>
          <option value="Chaotic Evil">Chaotic Evil</option>
        </select>
      </div>
      <div style="margin-top:16px; display:flex; gap:8px;">
        <button type="button" class="btn-primary" id="saveCharacterButton">Save Character</button>
        <button type="button" class="btn-action" id="cancelCharacterButton">Cancel</button>
      </div>
    </form>
  </div>

  <!-- ── Campaign Logs ──────────────────────────────────────────────── -->
  <h2>Campaign Logs</h2>
  <button class="btn-primary" id="createLogButton">+ New Log Entry</button>

  <div id="logFormContainer" class="form-container" style="display:none; margin-top:12px;">
    <h3 style="font-family:'Cinzel',serif; color:var(--text-heading); margin-bottom:16px;">Log Entry</h3>
    <form id="logForm">
      <input type="hidden" id="logId" name="id">
      <div class="form-row">
        <label for="logNarrative">Narrative Summary</label>
        <textarea id="logNarrative" name="narrative" required placeholder="What happened?" style="width:100%; background:#080808; border:1px solid var(--border); color:var(--text-main); padding:8px 10px; border-radius:4px; font-family:inherit; font-size:0.88rem; min-height:80px;"></textarea>
      </div>
      <div class="form-row">
        <label for="logEncounters">Encounters</label>
        <input type="text" id="logEncounters" name="encounters" placeholder="Combat encounters, traps, etc.">
      </div>
      <div class="form-row">
        <label for="logNpcDetails">NPCs / Lore</label>
        <input type="text" id="logNpcDetails" name="npc_details" placeholder="Important NPCs or lore revealed">
      </div>
      <div style="margin-top:16px; display:flex; gap:8px;">
        <button type="button" class="btn-primary" id="saveLogButton">Save Log</button>
        <button type="button" class="btn-action" id="cancelLogButton">Cancel</button>
      </div>
    </form>
  </div>

  <div id="campaignLogsList" style="display:flex; flex-direction:column; gap:8px; margin-top:12px;">
    <p style="color:var(--text-muted); font-size:0.85rem;">Loading campaign logs…</p>
  </div>

  <!-- ── Generate NPCs ──────────────────────────────────────────────── -->
  <h2>Generate NPCs</h2>
  <button class="btn-primary" id="generateNpcButton">⚄ Generate Random NPC</button>

  <!-- ── Saved NPCs (collapsible tree) ──────────────────────────────── -->
  <h2>Saved NPCs</h2>
  <div id="npcList">
    <p style="color:var(--text-muted); font-size:0.85rem;">Loading NPCs…</p>
  </div>

</div><!-- /.page-wrapper -->

<!-- ============================================================
     DICE ROLLER WIDGET (fixed, always visible)
     State persists in localStorage.
     ============================================================ -->
<div id="diceWidget">
  <button id="diceToggleBtn" aria-label="Open Dice Roller" title="Dice Roller">
    <span>⚄</span>
    <span id="diceBadge" class="hidden">0</span>
  </button>

  <div id="dicePanel" class="hidden">

    <div class="dp-header">
      <h3>⚄ Dice Roller</h3>
      <button id="dpClose" aria-label="Close">×</button>
    </div>

    <!-- Current selection chips -->
    <div class="dp-selection" id="dpSelection">
      <span class="dp-selection-empty">No dice selected — click a die below</span>
    </div>

    <!-- Standard dice picker -->
    <div class="dp-label">Standard Dice — click to add · right-click to remove</div>
    <div class="dp-grid" id="dpGrid">
      <!-- Rendered by JS -->
    </div>

    <!-- Controls -->
    <div class="dp-controls">
      <button id="dpRoll">Roll</button>
      <button id="dpReset">Reset</button>
      <button id="dpClear">Clear Log</button>
    </div>

    <!-- Roll results log -->
    <div class="dp-results" id="dpResults">
      <p style="color:var(--text-muted); font-size:0.78rem;">Roll results will appear here.</p>
    </div>

  </div>
</div>

<script>
// ============================================================
// NPC TREE
// ============================================================

document.getElementById('createCharacterButton').addEventListener('click', () => {
  const c = document.getElementById('characterFormContainer');
  c.style.display = c.style.display === 'none' ? 'block' : 'none';
});
document.getElementById('cancelCharacterButton').addEventListener('click', () => {
  document.getElementById('characterFormContainer').style.display = 'none';
});
document.getElementById('saveCharacterButton').addEventListener('click', submitCharacterForm);
document.getElementById('generateNpcButton').addEventListener('click', generateNpc);

// ============================================================
// CAMPAIGN LOGS
// ============================================================
document.getElementById('createLogButton').addEventListener('click', () => {
  const form = document.getElementById('logForm');
  form.reset();
  document.getElementById('logId').value = '';
  document.getElementById('logFormContainer').style.display = 'block';
});
document.getElementById('cancelLogButton').addEventListener('click', () => {
  document.getElementById('logFormContainer').style.display = 'none';
});
document.getElementById('saveLogButton').addEventListener('click', submitLogForm);

async function fetchLogs() {
  try {
    const res = await fetch('/campaigns');
    if (!res.ok) return;
    const logs = await res.json();
    const list = document.getElementById('campaignLogsList');
    list.innerHTML = '';
    if (!logs.length) {
      list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No logs yet — create one above.</p>';
      return;
    }
    logs.forEach(log => {
      const card = document.createElement('div');
      card.className = 'npc-card';
      card.style.padding = '12px 16px';
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <p style="font-size:0.9rem; line-height:1.5;">${log.narrative}</p>
            ${log.encounters ? `<p style="font-size:0.8rem; color:var(--text-muted); margin-top:6px;"><strong>Encounters:</strong> ${log.encounters}</p>` : ''}
            ${log.npc_details ? `<p style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;"><strong>NPCs/Lore:</strong> ${log.npc_details}</p>` : ''}
          </div>
          <div style="display:flex; gap:6px; flex-shrink:0;">
            <button class="btn-action" onclick="editLog(${log.id}, \`${escStr(log.narrative)}\`, \`${escStr(log.encounters)}\`, \`${escStr(log.npc_details)}\`)">Edit</button>
            <button class="btn-danger" onclick="deleteLog(${log.id})">Delete</button>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  } catch(e) { console.error('fetchLogs:', e); }
}

function editLog(id, narrative, encounters, npc_details) {
  const form = document.getElementById('logForm');
  form.id.value = id;
  form.narrative.value = narrative;
  form.encounters.value = encounters !== 'undefined' ? encounters : '';
  form.npc_details.value = npc_details !== 'undefined' ? npc_details : '';
  document.getElementById('logFormContainer').style.display = 'block';
}

async function submitLogForm() {
  const form = document.getElementById('logForm');
  const id = form.id.value;
  const payload = {
    narrative: form.narrative.value.trim(),
    encounters: form.encounters.value.trim(),
    npc_details: form.npc_details.value.trim()
  };
  if (!payload.narrative) return alert('Narrative is required');

  const url = id ? \`/campaigns/\${id}\` : '/campaigns';
  const method = id ? 'PUT' : 'POST';

  const res = await fetch(url, {
    method, headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if (res.ok) {
    document.getElementById('logFormContainer').style.display = 'none';
    fetchLogs();
  } else {
    const err = await res.json();
    alert(\`Failed: \${err.error || 'Check the form and try again.'}\`);
  }
}

async function deleteLog(id) {
  if (!confirm('Delete this campaign log?')) return;
  const res = await fetch(\`/campaigns/\${id}\`, { method:'DELETE' });
  if (res.ok || res.status === 204) fetchLogs();
}

async function fetchNpcs() {
  try {
    const res = await fetch('/npc');
    if (!res.ok) return;
    const npcs = await res.json();
    const list = document.getElementById('npcList');
    list.innerHTML = '';
    if (!npcs.length) {
      list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No NPCs yet — generate one above.</p>';
      return;
    }
    npcs.forEach(npc => {
      const s = npc.sheet || {};

      // Helper: format modifier with sign
      const fmt = v => (v === undefined || v === null) ? '—' : (typeof v === 'number' ? (v >= 0 ? `+${v}` : `${v}`) : v);

      // Ability scores block
      const abilityBlock = ['STR','DEX','CON','INT','WIS','CHA'].map(a => `
        <div class="cs-ability">
          <div class="cs-ability-label">${a}</div>
          <div class="cs-ability-mod">${s[a+'mod'] || fmt(s[a] ? Math.floor((s[a]-10)/2) : 0)}</div>
          <div class="cs-ability-score">${s[a] || '—'}</div>
        </div>`).join('');

      // Saving throws block
      const saves = ['STR','DEX','CON','INT','WIS','CHA'];
      const saveLabels = {STR:'Strength',DEX:'Dexterity',CON:'Constitution',INT:'Intelligence',WIS:'Wisdom',CHA:'Charisma'};
      const saveProfs = s.saving_throw_profs || [];
      const savesBlock = saves.map(a => {
        const prof = saveProfs.includes(a);
        const val  = s[`ST ${saveLabels[a]}`] || '—';
        return `<div class="cs-save-row ${prof ? 'proficient' : ''}">
          <span class="cs-prof-dot ${prof ? 'filled' : ''}">●</span>
          <span>${val} ${saveLabels[a]}</span></div>`;
      }).join('');

      // Skills block
      const ALL_SKILLS = {
        'Acrobatics':'DEX','Animal Handling':'WIS','Arcana':'INT','Athletics':'STR',
        'Deception':'CHA','History':'INT','Insight':'WIS','Intimidation':'CHA',
        'Investigation':'INT','Medicine':'WIS','Nature':'INT','Perception':'WIS',
        'Performance':'CHA','Persuasion':'CHA','Religion':'INT',
        'Sleight of Hand':'DEX','Stealth':'DEX','Survival':'WIS'
      };
      const profSkills = s.proficient_skills || [];
      const skillsData = s.skills || {};
      const skillsBlock = Object.entries(ALL_SKILLS).map(([skill, attr]) => {
        const prof = profSkills.includes(skill);
        const val  = skillsData[skill] ? skillsData[skill].value : '—';
        return `<div class="cs-skill-row ${prof ? 'proficient' : ''}">
          <span class="cs-prof-dot ${prof ? 'filled' : ''}">●</span>
          <span class="cs-skill-val">${val}</span>
          <span>${skill} <em style="color:var(--text-muted);font-size:0.7rem">(${attr})</em></span>
        </div>`;
      }).join('');

      // Weapons block
      const weapons = s.weapons || [];
      const weaponsBlock = weapons.length
        ? `<table class="cs-weapons-table">
            <thead><tr><th>Weapon</th><th>Atk Bonus</th><th>Damage/Type</th></tr></thead>
            <tbody>${weapons.map(w => `<tr><td>${w.name}</td><td>${w.atk_bonus}</td><td>${w.damage}</td></tr>`).join('')}</tbody>
           </table>`
        : '<p style="color:var(--text-muted);font-size:0.82rem;">No weapons listed.</p>';

      // Spells block
      const spells = s.spells || [];
      const spellsBlock = spells.length
        ? spells.map(sp => `<span class="stat-pill">${sp}</span>`).join('')
        : '<span style="color:var(--text-muted);font-size:0.82rem;">None</span>';

      details = document.createElement('details');
      details.className = 'npc-card';
      details.id = `npc-${npc.id}`;
      details.innerHTML = `
        <summary class="npc-summary">
          <span class="npc-chevron">▶</span>
          <span class="npc-summary-name">${npc.name}</span>
          <span class="npc-badge badge-role">${npc.role}</span>
          <span class="npc-badge badge-align">${npc.alignment || '—'}</span>
        </summary>

        <div class="cs-sheet">

          <!-- ── Identity Bar ── -->
          <div class="cs-identity">
            <div class="cs-id-field"><label>Race</label><span>${s.RACE || '—'}</span></div>
            <div class="cs-id-field"><label>Class & Level</label><span>${s.CLASS_LEVEL || npc.role}</span></div>
            <div class="cs-id-field"><label>Background</label><span>${s.BACKGROUND || '—'}</span></div>
            <div class="cs-id-field"><label>Alignment</label><span>${s.ALIGNMENT || npc.alignment}</span></div>
            <div class="cs-id-field"><label>Gender / Age</label><span>${s.GENDER || '—'} · ${s.AGE || '—'}</span></div>
            <div class="cs-id-field"><label>Size / Speed</label><span>${s.SIZE || '—'} · ${s.Speed || '—'} ft</span></div>
          </div>

          <div class="cs-columns">

            <!-- ── Left Column ── -->
            <div class="cs-left">

              <!-- Ability Scores -->
              <div class="cs-section-label">Ability Scores</div>
              <div class="cs-abilities">${abilityBlock}</div>

              <!-- Combat Row -->
              <div class="cs-section-label" style="margin-top:12px;">Combat</div>
              <div class="cs-combat-row">
                <div class="cs-combat-box"><div class="cs-combat-val">${s.AC || '—'}</div><div class="cs-combat-lbl">AC</div></div>
                <div class="cs-combat-box"><div class="cs-combat-val">${s.Init || '—'}</div><div class="cs-combat-lbl">Initiative</div></div>
                <div class="cs-combat-box"><div class="cs-combat-val">${s.Speed || '—'}</div><div class="cs-combat-lbl">Speed</div></div>
                <div class="cs-combat-box"><div class="cs-combat-val">${s.MaxHP || '—'}</div><div class="cs-combat-lbl">Max HP</div></div>
                <div class="cs-combat-box"><div class="cs-combat-val">${s.HD || '—'}</div><div class="cs-combat-lbl">Hit Die</div></div>
                <div class="cs-combat-box"><div class="cs-combat-val">${s.ProfBonus || '—'}</div><div class="cs-combat-lbl">Prof Bonus</div></div>
              </div>

              <!-- Saving Throws -->
              <div class="cs-section-label" style="margin-top:12px;">Saving Throws</div>
              <div class="cs-saves">${savesBlock}</div>

              <!-- Passive Perception -->
              <div class="cs-passive">Passive Perception: <strong>${s.Passive || '—'}</strong></div>

            </div>

            <!-- ── Middle Column (Skills) ── -->
            <div class="cs-middle">
              <div class="cs-section-label">Skills</div>
              <div class="cs-skills">${skillsBlock}</div>
            </div>

            <!-- ── Right Column ── -->
            <div class="cs-right">

              <!-- Appearance -->
              <div class="cs-section-label">Appearance</div>
              <div class="cs-appearance">
                <div class="cs-app-row"><label>Eyes</label><span>${s.EYES || '—'}</span></div>
                <div class="cs-app-row"><label>Hair</label><span>${s.HAIR || '—'}</span></div>
                <div class="cs-app-row"><label>Skin</label><span>${s.SKIN || '—'}</span></div>
                <div class="cs-app-row"><label>Height</label><span>${s.HEIGHT || '—'}</span></div>
                <div class="cs-app-row"><label>Weight</label><span>${s.WEIGHT || '—'}</span></div>
              </div>

              <!-- Weapons -->
              <div class="cs-section-label" style="margin-top:12px;">Weapons &amp; Attacks</div>
              ${weaponsBlock}

              <!-- Spells -->
              <div class="cs-section-label" style="margin-top:12px;">Spells
                ${s.spellCastingAbility ? `<em style="color:var(--text-muted);font-size:0.7rem;font-family:inherit">(${s.spellCastingAbility})</em>` : ''}
              </div>
              <div class="stat-pills" style="margin-top:4px;">${spellsBlock}</div>

              <!-- Features & Traits -->
              <div class="cs-section-label" style="margin-top:12px;">Class Features</div>
              <p class="cs-text">${s.class_features || '—'}</p>

              <div class="cs-section-label" style="margin-top:8px;">Racial Features</div>
              <p class="cs-text">${s.racial_features || npc.racial_features || '—'}</p>

              <!-- Currency -->
              <div class="cs-section-label" style="margin-top:12px;">Starting Gold</div>
              <div class="cs-currency">
                <span class="cs-coin gp">GP: ${s.GP ?? '—'}</span>
                <span class="cs-coin sp">SP: ${s.SP ?? '—'}</span>
                <span class="cs-coin cp">CP: ${s.CP ?? '—'}</span>
              </div>

            </div>
          </div>

          <!-- ── Personality ── -->
          <div class="cs-personality">
            <div class="cs-pers-box"><label>Personality Traits</label><p>${s.PersonalityTraits || '—'}</p></div>
            <div class="cs-pers-box"><label>Ideals</label><p>${s.Ideals || '—'}</p></div>
            <div class="cs-pers-box"><label>Bonds</label><p>${s.Bonds || '—'}</p></div>
            <div class="cs-pers-box"><label>Flaws</label><p>${s.Flaws || '—'}</p></div>
          </div>

          <!-- ── Actions ── -->
          <div class="npc-actions">
            <button class="btn-action" onclick="generateQuest(${npc.id},'${escStr(npc.name)}')">⚔ Quest</button>
            <button class="btn-action" onclick="generateLoot(${npc.id})">💰 Loot</button>
            <button class="btn-danger" onclick="deleteNpc(${npc.id})">🗑 Delete</button>
          </div>

          <!-- ── Chat ── -->
          <div class="chat-section">
            <h4>Chat with ${npc.name}</h4>
            <div class="chat-history" id="chatHistory-${npc.id}"></div>
            <div class="chat-input">
              <input type="text" id="chatInput-${npc.id}" placeholder="Say something…">
              <button class="btn-action" onclick="chatWithNpc(${npc.id},'${escStr(npc.name)}')">Send</button>
            </div>
          </div>

        </div><!-- /.cs-sheet -->
      `;
      list.appendChild(details);
      loadChatHistory(npc.id);
    });
  } catch(e) { console.error('fetchNpcs:', e); }
}

function escStr(s) { return (s||'').replace(/'/g,"\\'"); }

async function generateNpc() {
  const btn = document.getElementById('generateNpcButton');
  btn.disabled = true; btn.textContent = 'Generating…';
  const res = await fetch('/npc/generate', { method:'POST' });
  btn.disabled = false; btn.textContent = '⚄ Generate Random NPC';
  if (res.ok) fetchNpcs(); else alert('Failed to generate NPC.');
}

async function deleteNpc(npcId) {
  if (!confirm('Delete this NPC and all their chat history?')) return;
  const res = await fetch(`/npc/${npcId}`, { method:'DELETE' });
  if (res.ok || res.status === 204) fetchNpcs();
}

async function loadChatHistory(npcId) {
  const res = await fetch(`/npc/${npcId}/chat`);
  if (!res.ok) return;
  renderMessages(npcId, await res.json());
}

function renderMessages(npcId, messages) {
  const box = document.getElementById(`chatHistory-${npcId}`);
  if (!box) return;
  box.innerHTML = messages.length
    ? messages.map(m => `<p><strong>${m.sender === 'player' ? 'You' : 'NPC'}:</strong> ${m.content}</p>`).join('')
    : '';
  box.scrollTop = box.scrollHeight;
}

async function chatWithNpc(npcId, npcName) {
  const input = document.getElementById(`chatInput-${npcId}`);
  const text = input.value.trim();
  if (!text) { alert('Please enter a message.'); return; }
  const res = await fetch(`/npc/${npcId}/chat`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ input: text })
  });
  if (res.ok) {
    const data = await res.json();
    renderMessages(npcId, data.messages);
    input.value = '';
  } else {
    const err = await res.json();
    alert(`Error: ${err.error || 'Failed to send.'}`);
  }
}

async function generateQuest(npcId, npcName) {
  const location = prompt(`Where is ${npcName} assigning the quest?`);
  if (!location) return;
  const res = await fetch(`/npc/${npcId}/generate_quest`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ location })
  });
  if (res.ok) {
    const data = await res.json();
    const box = document.getElementById(`chatHistory-${npcId}`);
    if (box) { box.innerHTML += `<p><strong>${npcName}:</strong> ${data.quest}</p>`; box.scrollTop = box.scrollHeight; }
  } else alert('Failed to generate quest.');
}

async function generateLoot(npcId) {
  const questName = prompt('Quest name (for thematic loot)?') || 'the recent quest';
  const res = await fetch(`/npc/${npcId}/generate_loot`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ quest_name: questName })
  });
  if (res.ok) {
    const data = await res.json();
    const box = document.getElementById(`chatHistory-${npcId}`);
    if (box) { box.innerHTML += `<p><strong>Loot:</strong> ${data.loot}</p>`; box.scrollTop = box.scrollHeight; }
  } else alert('Failed to generate loot.');
}

async function submitCharacterForm() {
  const form = document.getElementById('characterForm');
  const rawStats = form.characterStats.value.split(',').map(s => parseInt(s.trim(), 10));
  const stats = { STR: rawStats[0]||10, DEX: rawStats[1]||10, CON: rawStats[2]||10,
                  INT: rawStats[3]||10, WIS: rawStats[4]||10, CHA: rawStats[5]||10 };
  const payload = {
    name: form.characterName.value.trim(),
    species: form.characterSpecies.value,
    character_class: form.characterClass.value,
    alignment: form.characterAlignment.value,
    background: form.characterBackground.value.trim(),
    stats
  };
  const res = await fetch('/player_profiles', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if (res.ok) {
    alert('Character saved!');
    form.reset();
    document.getElementById('characterFormContainer').style.display = 'none';
  } else {
    const err = await res.json();
    alert(`Failed: ${err.error || 'Check the form and try again.'}`);
  }
}

// ============================================================
// DICE ROLLER — state persists in localStorage
// ============================================================

const DICE_TYPES = ['d4','d6','d8','d10','d12','d20','d100'];
const STORAGE_KEY = 'dmml_dice_state';

function loadDiceState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveDiceState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function totalDice(state) {
  return DICE_TYPES.reduce((n, d) => n + (state[d] || 0), 0);
}

function buildDiceGrid() {
  const grid = document.getElementById('dpGrid');
  grid.innerHTML = '';
  DICE_TYPES.forEach(die => {
    const btn = document.createElement('button');
    btn.className = 'die-btn';
    btn.dataset.die = die;
    btn.title = `Left-click: add ${die} · Right-click: remove ${die}`;
    btn.innerHTML = `
      <div class="die-shape-wrap">
        <div class="die-shape ${die}">${die}</div>
        <span class="die-count-badge hidden" id="badge-${die}">0</span>
      </div>
      <span class="die-label">${die}</span>
    `;
    btn.addEventListener('click', () => adjustDie(die, 1));
    btn.addEventListener('contextmenu', (e) => { e.preventDefault(); adjustDie(die, -1); });
    grid.appendChild(btn);
  });
}

function adjustDie(die, delta) {
  const state = loadDiceState();
  state[die] = Math.max(0, (state[die] || 0) + delta);
  saveDiceState(state);
  updateDiceUI(state);
}

function updateDiceUI(state) {
  // Badge on toggle button
  const total = totalDice(state);
  const badge = document.getElementById('diceBadge');
  badge.textContent = total;
  badge.classList.toggle('hidden', total === 0);

  // Per-die count badges on picker
  DICE_TYPES.forEach(die => {
    const b = document.getElementById(`badge-${die}`);
    if (!b) return;
    const n = state[die] || 0;
    b.textContent = n;
    b.classList.toggle('hidden', n === 0);
  });

  // Selection chips
  const sel = document.getElementById('dpSelection');
  sel.innerHTML = '';
  const active = DICE_TYPES.filter(d => (state[d] || 0) > 0);
  if (!active.length) {
    sel.innerHTML = '<span class="dp-selection-empty">No dice selected — click a die below</span>';
  } else {
    active.forEach(die => {
      const chip = document.createElement('span');
      chip.className = 'dp-chip';
      chip.innerHTML = `<span class="chip-n">${state[die]}</span><span>${die}</span>`;
      sel.appendChild(chip);
    });
  }
}

function rollDice() {
  const state = loadDiceState();
  const active = DICE_TYPES.filter(d => (state[d] || 0) > 0);
  if (!active.length) { alert('Select some dice first!'); return; }

  let total = 0;
  const groups = [];

  active.forEach(die => {
    const sides = die === 'd100' ? 100 : parseInt(die.slice(1));
    const count = state[die];
    const rolls = [];
    for (let i = 0; i < count; i++) {
      const r = Math.floor(Math.random() * sides) + 1;
      rolls.push(r);
      total += r;
    }
    groups.push({ die, rolls });
  });

  renderRollResult(total, groups);
}

function renderRollResult(total, groups) {
  const results = document.getElementById('dpResults');
  const now = new Date();
  const time = now.toLocaleTimeString();

  const pips = groups.flatMap(({ die, rolls }) =>
    rolls.map(r => `
      <div class="roll-die-pip">
        <div class="pip-shape pip-${die}">${r}</div>
        <span class="pip-label">${die}</span>
      </div>`)
  ).join('');

  const entry = document.createElement('div');
  entry.className = 'roll-entry';
  entry.innerHTML = `
    <span class="roll-timestamp">[${time}]</span>
    <span class="roll-total">Total: ${total}</span>
    <div class="roll-dice-grid">${pips}</div>
  `;

  // Prepend so newest is on top
  const placeholder = results.querySelector('p');
  if (placeholder) placeholder.remove();
  results.insertBefore(entry, results.firstChild);
}

// ── Wire up dice panel controls ────────────────────────────
document.getElementById('diceToggleBtn').addEventListener('click', () => {
  document.getElementById('dicePanel').classList.toggle('hidden');
});
document.getElementById('dpClose').addEventListener('click', () => {
  document.getElementById('dicePanel').classList.add('hidden');
});
document.getElementById('dpRoll').addEventListener('click', rollDice);
document.getElementById('dpReset').addEventListener('click', () => {
  saveDiceState({});
  updateDiceUI({});
});
document.getElementById('dpClear').addEventListener('click', () => {
  document.getElementById('dpResults').innerHTML =
    '<p style="color:var(--text-muted);font-size:0.78rem;">Roll results will appear here.</p>';
});

// ── Init ──────────────────────────────────────────────────
buildDiceGrid();
updateDiceUI(loadDiceState());
fetchNpcs();
fetchLogs();
</script>
