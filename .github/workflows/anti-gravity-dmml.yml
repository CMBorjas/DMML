name: Anti-Gravity DMML Sandbox Engine
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compile-to-serverless-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout DMML Codebase
        uses: actions/checkout@v4

      - name: 2. Validate Sandbox Metadata Manifest
        id: parse-manifest
        run: |
          if [ ! -f sandbox.json ]; then
            echo "ERROR: sandbox.json manifest not found at root directory!" && exit 1
          fi
          
          RUNTIME_CLASS=$(jq -r '.runtime_class' sandbox.json)
          ENGINE_TYPE=$(jq -r '.engine_type' sandbox.json)
          SOURCE_ENTRY=$(jq -r '.source_entry' sandbox.json)
          
          echo "ENTRY_POINT=$SOURCE_ENTRY" >> $GITHUB_ENV
          echo "ENGINE_FORMAT=$ENGINE_TYPE" >> $GITHUB_ENV
          echo "RUNTIME_TARGET=$RUNTIME_CLASS" >> $GITHUB_ENV
          echo "Validated sandbox.json successfully. Found engine: $ENGINE_TYPE"

      - name: 3. Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 4. Install Toolchain Components & Project Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ env.ENGINE_FORMAT }}" = "marimo" ]; then
            pip install marimo
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # --- PIPELINE SELECTION A: MARIMO EXPORT RULE ---
      - name: 5a. Execute Marimo Application Compilation
        if: env.ENGINE_FORMAT == 'marimo'
        run: |
          mkdir -p build-output
          marimo export html-wasm ${{ env.ENTRY_POINT }} --output build-output/index.html

      # --- PIPELINE SELECTION B: PURE PYODIDE TERMINAL PACKAGING ---
      - name: 5b. Execute Pyodide Terminal Virtualization Packaging
        if: env.ENGINE_FORMAT == 'pyodide-terminal'
        run: |
          mkdir -p build-output
          cp ${{ env.ENTRY_POINT }} build-output/run.py
          
          cat << 'EOF' > build-output/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>Anti-Gravity Serverless Terminal</title>
              <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
              <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
              <style>
                  body { margin:0; background:#0c0c0c; color:#00ff00; font-family:monospace; padding:15px; }
                  .xterm-viewport { overflow-y: auto; }
              </style>
          </head>
          <body>
              <div id="terminal" style="width:100%; height:95vh;"></div>
              <script type="module">
                  const term = new Terminal({ cursorBlink: true, theme: { background: '#0c0c0c', foreground: '#00ff00' } });
                  term.open(document.getElementById('terminal'));
                  term.write('\x1b[1;32m[Anti-Gravity Engine]\x1b[0m Initializing Serverless Python Sandbox Environment...\r\n');
                  
                  async function runMain() {
                      try {
                          let pyodide = await loadPyodide();
                          term.write('\x1b[1;32m[System]\x1b[0m Python runtime core initialized natively in browser storage.\r\n');
                          
                          let response = await fetch('./run.py');
                          let code = await response.text();
                          pyodide.FS.writeFile('run.py', code);
                          
                          term.write('\x1b[1;34m[Runtime]\x1b[0m Launching script instance process loop:\r\n\r\n');
                          
                          let output = await pyodide.runPythonAsync(`
                              import sys
                              from io import StringIO
                              sys.stdout = StringIO()
                              sys.stderr = StringIO()
                              try:
                                  exec(open("run.py").read())
                              except Exception as e:
                                  print(f"Runtime Exception: {e}", file=sys.stderr)
                              sys.stdout.getvalue() + sys.stderr.getvalue()
                          `);
                          term.write(output.replace(/\n/g, '\r\n'));
                      } catch (err) {
                          term.write('\r\n\x1b[1;31m[Fatal Intercept]:\x1b[0m ' + err + '\r\n');
                      }
                  }
                  runMain();
              </script>
          </body>
          </html>
          EOF

      - name: 6. Securely Dispatch and Sync with Main Portfolio Repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.ANTIGRAVITY_SYNC_TOKEN }}
        with:
          source-directory: 'build-output'
          destination-github-username: 'CMBorjas'
          destination-repository-name: 'resume'
          target-directory: 'sandboxes/dmml-framework'
          target-branch: 'main'
          user-email: 'anti-gravity-engine@github.com'
          user-name: 'Anti-Gravity Sync Bot'
          commit-message: 'chore(sandbox): auto-deploy compiled DMML serverless layer'