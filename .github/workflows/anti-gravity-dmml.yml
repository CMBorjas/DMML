name: Anti-Gravity DMML Sandbox Engine
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger a build from the GitHub UI

jobs:
  compile-to-serverless-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout DMML Codebase
        uses: actions/checkout@v4

      - name: 2. Validate Sandbox Metadata Manifest
        id: parse-manifest
        run: |
          if [ ! -f sandbox.json ]; then
            echo "ERROR: sandbox.json manifest not found at root directory!" && exit 1
          fi
          
          # Extract entry parameters programmatically using jq
          RUNTIME_CLASS=$(jq -r '.runtime_class' sandbox.json)
          ENGINE_TYPE=$(jq -r '.engine_type' sandbox.json)
          SOURCE_ENTRY=$(jq -r '.source_entry' sandbox.json)
          
          if [ "$RUNTIME_CLASS" != "wasm-interpreter" ] || [ "$ENGINE_TYPE" != "marimo" ]; then
            echo "ERROR: Mismatched runtime engine. Expected marimo / wasm-interpreter." && exit 1
          fi
          
          echo "ENTRY_POINT=$SOURCE_ENTRY" >> $GITHUB_ENV
          echo "Validated sandbox.json successfully."

      - name: 3. Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 4. Install Toolchain Components & Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install marimo
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: 5. Execute WebAssembly App Compilation
        run: |
          mkdir -p build-output
          # Build a light serverless HTML payload that fetches Pyodide and runs your raw run.py code client-side
          cat << 'EOF' > build-output/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>Anti-Gravity Serverless Terminal</title>
              <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
              <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
          </head>
          <body style="margin:0; background:#0c0c0c; color:#fff; font-family:monospace; padding:15px;">
              <div id="terminal" style="width:100%; height:90vh;"></div>
              <script type="module">
                  const term = new Terminal();
                  term.open(document.getElementById('terminal'));
                  term.write('Initializing Serverless Python Engine (Pyodide)...\r\n');
                  
                  async function initPyodide() {
                      let pyodide = await loadPyodide();
                      term.write('Python Engine Loaded. Syncing script layers...\r\n');
                      
                      // Fetch your raw file into Pyodide's virtual filesystem
                      let response = await fetch('./run.py');
                      let code = await response.text();
                      pyodide.FS.writeFile('run.py', code);
                      
                      term.write('Running Engine Logic:\r\n\r\n');
                      try {
                          let output = await pyodide.runPythonAsync(`
                              import sys
                              from io import StringIO
                              sys.stdout = StringIO()
                              exec(open("run.py").read())
                              sys.stdout.getvalue()
                          `);
                          term.write(output.replace(/\n/g, '\r\n'));
                      } catch (err) {
                          term.write('\r\nError executing script: ' + err);
                      }
                  }
                  initPyodide();
              </script>
          </body>
          </html>
          EOF
          
          # Copy your raw run.py along with the html file so the client browser can fetch it
          cp run.py build-output/run.py

      - name: 6. Securely Dispatch and Sync with Main Portfolio Repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # You will need to add a GitHub Personal Access Token (PAT) named ANTIGRAVITY_SYNC_TOKEN 
          # to your DMML repo secrets so it has write access to your main portfolio repo
          API_TOKEN_GITHUB: ${{ secrets.ANTIGRAVITY_SYNC_TOKEN }}
        with:
          source-directory: 'build-output'
          destination-github-username: 'CMBorjas'
          destination-repository-name: 'resume' # Change this if your portfolio website repo has a different name
          target-directory: 'sandboxes/dmml-framework'
          target-branch: 'main'
          user-email: 'anti-gravity-engine@github.com'
          user-name: 'Anti-Gravity Sync Bot'
          commit-message: 'chore(sandbox): auto-deploy compiled DMML serverless WASM layer'